<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text="Voltar"></ion-back-button>
    </ion-buttons>
    <ion-title>Configurações</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense" class="ion-no-border">
    <ion-toolbar>
      <ion-title size="large">Configurações</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="settings-container">
    <ion-card class="settings-card">
      <ion-card-header>
        <ion-card-title>Preferências do App</ion-card-title>
      </ion-card-header>
      
      <ion-card-content class="ion-no-padding">
        <ion-list lines="full">
          
          <ion-item>
            <ion-icon slot="start" name="sync-outline" color="primary"></ion-icon>
            <ion-label>
              <h2>Atualização de Taxas</h2>
              <p>Frequência de busca na API</p>
            </ion-label>
            <ion-select [(ngModel)]="updateFrequency" (ionChange)="onFrequencyChange()" interface="action-sheet" slot="end">
              <ion-select-option value="always">Sempre abrir</ion-select-option>
              <ion-select-option value="hourly">A cada hora</ion-select-option>
              <ion-select-option value="manual">Manual</ion-select-option>
            </ion-select>
          </ion-item>

          @if (updateFrequency === 'manual') {
            <ion-item lines="none" class="manual-update-item">
              <ion-button slot="end" size="small" fill="outline" color="primary" [disabled]="isUpdating" (click)="updateRatesManually()">
                @if (isUpdating) {
                  <ion-spinner name="crescent" slot="start"></ion-spinner>
                  A atualizar...
                } @else {
                  <ion-icon name="refresh-outline" slot="start"></ion-icon>
                  Atualizar Agora
                }
              </ion-button>
            </ion-item>
          }



          <ion-item>
            <ion-icon slot="start" name="notifications-outline" color="success"></ion-icon>
            <ion-label>
              <h2>Notificações</h2>
              <p>Alertas de variação</p>
            </ion-label>
            <ion-toggle slot="end" [(ngModel)]="notifications" (ionChange)="onNotificationsChange()"></ion-toggle>
          </ion-item>

        </ion-list>
      </ion-card-content>
    </ion-card>


  </div>
</ion-content>
